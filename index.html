<meta name="description" content="Perfumes originales en Uruguay. Pedidos por WhatsApp." />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  :root {
    --azul: #0B3D91;
    --azul-oscuro: #061F4A;
    --azul-claro: #E8F0FE;
    --azul-tenue: #F4F8FD;
    --dorado: #C9A24B;
    --dorado-suave: #FDF4E0;
    --gris: #4B5563;
    --gris-suave: #9CA3AF;
    --blanco: #FFFFFF;
    --borde: #E5EAF2;
    --sombra-hover: 0 8px 28px rgba(11, 61, 145, 0.14);
    --radio: 12px;
    --tap: 44px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--azul-oscuro);
    background: var(--blanco);
    line-height: 1.5;
    font-size: 15px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  img { max-width: 100%; height: auto; display: block; }
  button { font-family: inherit; }

  .hero {
    background: linear-gradient(135deg, var(--azul) 0%, var(--azul-oscuro) 100%);
    color: var(--blanco);
    padding: 2.25rem 1.25rem 1.75rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(201,162,75,0.18) 0%, transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(255,255,255,0.08) 0%, transparent 45%);
    pointer-events: none;
  }
  .brand-logo {
    width: 150px; height: 150px;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    border-radius: 50%;
    display: block; margin: 0 auto;
    position: relative;
  }
  .hero-sub {
    font-size: 0.72rem; font-weight: 400; letter-spacing: 0.18em;
    text-transform: uppercase; margin-top: 0.8rem; opacity: 0.9; position: relative;
    color: var(--blanco);
  }
  .hero-deco { width: 48px; height: 1px; background: var(--dorado); margin: 0.6rem auto 0; position: relative; }

  .toolbar {
    position: sticky; top: 0; z-index: 10;
    background: rgba(255,255,255,0.97);
    backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--borde);
    padding: 0.75rem 0;
  }
  .toolbar-inner { display: flex; flex-direction: column; gap: 0.6rem; padding: 0 1rem; }
  .search {
    width: 100%; border: 1px solid var(--borde);
    padding: 0 1rem; height: var(--tap); border-radius: 999px;
    font-family: inherit; font-size: 16px;
    color: var(--azul-oscuro); outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  .search:focus { border-color: var(--azul); box-shadow: 0 0 0 3px rgba(11,61,145,0.12); }
  .filters {
    display: flex; gap: 0.4rem; overflow-x: auto;
    scroll-snap-type: x proximity; padding: 2px 1rem;
    margin: 0 -1rem; scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex-shrink: 0; scroll-snap-align: start;
    border: 1px solid var(--borde); background: var(--blanco);
    color: var(--gris); padding: 0 1rem; height: 38px;
    border-radius: 999px; font-size: 0.82rem; font-weight: 500;
    cursor: pointer; transition: all 0.18s ease; white-space: nowrap;
  }
  .chip:active { transform: scale(0.97); }
  .chip.active { background: var(--azul); color: var(--blanco); border-color: var(--azul); }
  .chip.promo-filter { border-color: var(--dorado); color: var(--dorado); font-weight: 600; }
  .chip.promo-filter.active { background: var(--dorado); border-color: var(--dorado); color: var(--blanco); }

  .container { padding: 1.25rem 1rem 3rem; max-width: 1200px; margin: 0 auto; }
  .section-head { margin-bottom: 1rem; }
  .section-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.5rem; font-weight: 600; color: var(--azul); line-height: 1.15;
  }
  .section-sub { color: var(--gris-suave); font-size: 0.82rem; margin-top: 0.15rem; }
  .grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.85rem; }

  .card {
    background: var(--blanco); border: 1px solid var(--borde);
    border-radius: var(--radio); overflow: hidden;
    transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
    display: flex; flex-direction: column; position: relative;
    scroll-margin-top: 140px;
  }
  .card:active { transform: scale(0.98); }
  .card.promo { border-color: var(--dorado); }
  .card.highlighted {
    border-color: var(--azul); box-shadow: 0 0 0 3px rgba(11,61,145,0.18);
    animation: pulse 1.2s ease-in-out 2;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 3px rgba(11,61,145,0.18); }
    50% { box-shadow: 0 0 0 8px rgba(11,61,145,0.05); }
  }
  .card-img {
    aspect-ratio: 1 / 1.15;
    background: linear-gradient(135deg, var(--azul-tenue) 0%, var(--azul-claro) 100%);
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .card.promo .card-img { background: linear-gradient(135deg, #FFFAEB 0%, #FDF4E0 100%); }
  .card-img svg { width: 48%; height: 70%; opacity: 0.55; }
  .card-img img {
    width: 100%; height: 100%; object-fit: contain; padding: 0.8rem;
    transition: transform 0.3s ease;
  }
  .card:hover .card-img img { transform: scale(1.05); }

  .badge {
    position: absolute; top: 8px; left: 8px;
    font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 0.28rem 0.55rem;
    border-radius: 4px; background: var(--dorado); color: var(--blanco);
    box-shadow: 0 2px 6px rgba(0,0,0,0.12);
  }
  .badge.genero {
    background: rgba(11,61,145,0.88); left: auto; right: 8px; font-weight: 600;
  }
  .badge.genero-mujer {
    background: rgba(216, 27, 96, 0.92); /* rosa sofisticado */
  }
  .badge.genero-unisex {
    background: rgba(107, 114, 128, 0.92); /* gris neutro */
  }

  .card-body { padding: 0.8rem 0.85rem 0.95rem; flex: 1; display: flex; flex-direction: column; }
  .brand-name {
    font-size: 0.62rem; font-weight: 700; color: var(--azul);
    letter-spacing: 0.14em; text-transform: uppercase; margin-bottom: 0.25rem;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .perfume-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.08rem; font-weight: 600; color: var(--azul-oscuro);
    line-height: 1.15; margin-bottom: 0.3rem;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden; min-height: 2.5em;
  }
  .ml { font-size: 0.72rem; color: var(--gris-suave); margin-bottom: 0.5rem; }
  .notas {
    font-size: 0.75rem; color: var(--gris); line-height: 1.4; margin-bottom: 0.75rem;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }
  .price-row { display: flex; align-items: baseline; gap: 0.35rem; margin-bottom: 0.7rem; flex-wrap: wrap; }
  .price { font-size: 1.1rem; font-weight: 700; color: var(--azul); line-height: 1; }
  .card.promo .price { color: var(--dorado); }
  .price-cur { font-size: 0.65rem; color: var(--gris-suave); font-weight: 500; }
  .price-before { font-size: 0.82rem; color: var(--gris-suave); text-decoration: line-through; font-weight: 500; }
  .wa-btn {
    display: flex; align-items: center; justify-content: center; gap: 0.45rem;
    background: #25D366; color: var(--blanco); padding: 0.65rem 0.75rem;
    border-radius: 10px; text-decoration: none; font-weight: 600;
    font-size: 0.78rem; transition: background 0.18s; min-height: var(--tap);
  }
  .wa-btn:active { background: #1EB855; }
  .wa-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

  .empty, .loading, .error-box {
    grid-column: 1 / -1; text-align: center; padding: 3rem 1rem;
    color: var(--gris-suave); font-size: 0.9rem;
  }
  .error-box {
    background: #FFF5F5; border: 1px solid #FED7D7; color: #9B2C2C;
    border-radius: 12px; padding: 1.5rem;
  }
  .error-box code { background: #FED7D7; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.8rem; }
  .spinner {
    width: 32px; height: 32px; border: 3px solid var(--azul-claro);
    border-top-color: var(--azul); border-radius: 50%;
    margin: 0 auto 1rem; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  footer {
    background: var(--azul-oscuro); color: var(--blanco);
    padding: 2rem 1.25rem; text-align: center;
  }
  footer .f-brand {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 1.35rem; margin-bottom: 0.4rem;
  }
  footer .f-brand span { color: var(--dorado); font-style: italic; }
  footer p { font-size: 0.78rem; opacity: 0.75; line-height: 1.5; }
  footer a { color: var(--dorado); text-decoration: none; }
  footer .wa-global {
    display: inline-flex; align-items: center; gap: 0.5rem;
    margin-top: 1rem; padding: 0.6rem 1.25rem;
    background: #25D366; color: var(--blanco);
    border-radius: 999px; text-decoration: none;
    font-weight: 600; font-size: 0.85rem;
  }
  footer .wa-global svg { width: 16px; height: 16px; }

  /* ========== BOTÓN FLOTANTE WHATSAPP ========== */
  .fab-wa {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 50;
    display: flex; align-items: center; gap: 0.55rem;
    background: #25D366; color: var(--blanco);
    padding: 0.85rem 1.1rem;
    border-radius: 999px;
    text-decoration: none;
    font-weight: 600; font-size: 0.88rem;
    box-shadow: 0 6px 20px rgba(37, 211, 102, 0.45);
    animation: fabPulse 2.5s ease-in-out infinite;
    max-width: calc(100vw - 40px);
  }
  .fab-wa:active { transform: scale(0.96); }
  .fab-wa svg { width: 22px; height: 22px; flex-shrink: 0; }
  .fab-wa .fab-label { display: none; }
  @keyframes fabPulse {
    0%, 100% { box-shadow: 0 6px 20px rgba(37, 211, 102, 0.45); }
    50%      { box-shadow: 0 6px 30px rgba(37, 211, 102, 0.75); }
  }

  @media (min-width: 560px) {
    .fab-wa .fab-label { display: inline; }
  }

  @media (min-width: 560px) {
    .container { padding: 1.75rem 1.25rem 3rem; }
    .grid { grid-template-columns: repeat(3, minmax(0,1fr)); gap: 1rem; }
    .perfume-name { font-size: 1.15rem; }
    .price { font-size: 1.2rem; }
    .wa-btn { font-size: 0.85rem; padding: 0.75rem; }
  }
  @media (min-width: 900px) {
    .hero { padding: 3.5rem 1.5rem 2.75rem; }
    .brand-logo { width: 200px; height: 200px; }
    .hero-sub { font-size: 0.9rem; margin-top: 1.2rem; }
    .hero-deco { width: 60px; margin-top: 1rem; }
    .fab-wa { bottom: 28px; right: 28px; padding: 0.95rem 1.35rem; font-size: 0.92rem; }
    .toolbar { padding: 1rem 0; }
    .toolbar-inner {
      flex-direction: row; align-items: center; justify-content: space-between;
      gap: 1rem; padding: 0 1.5rem;
    }
    .filters { flex-wrap: wrap; overflow: visible; padding: 0; margin: 0; gap: 0.5rem; }
    .chip { height: 40px; padding: 0 1.1rem; font-size: 0.85rem; }
    .search { min-width: 260px; max-width: 320px; font-size: 0.9rem; }
    .container { padding: 2.5rem 1.5rem 4rem; }
    .section-title { font-size: 1.85rem; }
    .section-sub { font-size: 0.9rem; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.5rem; }
    .card:hover { transform: translateY(-4px); box-shadow: var(--sombra-hover); }
    .card-body { padding: 1.1rem 1.15rem 1.2rem; }
    .perfume-name { font-size: 1.3rem; min-height: 2.6em; }
    .notas { font-size: 0.82rem; }
    .price { font-size: 1.4rem; }
    .wa-btn { font-size: 0.88rem; }
  }
</style>
</head>

fimgs.net/mdimg/perfume/375x500.401.jpg"},{"id":86,"marca":"Nina Ricci","nombre":"Nina EDT","genero":"Mujer","ml":80,"notas":"Limón, lima, manzana dulce, peonía, vainilla. Frutal floral gourmand.","precio":5500,"precio_antes":null,"stock":true,"promocion":false,"imagen":"https://fimgs.net/mdimg/perfume/375x500.147.jpg"},{"id":87,"marca":"Nina Ricci","nombre":"Luna EDT","genero":"Mujer","ml":80,"notas":"Pomelo, caramelo, azahar, algodón de azúcar. Frutal dulce joven.","precio":5200,"precio_antes":null,"stock":true,"promocion":false,"imagen":"https://fimgs.net/mdimg/perfume/375x500.22999.jpg"},{"id":88,"marca":"Bvlgari","nombre":"Omnia Crystalline EDT","genero":"Mujer","ml":65,"notas":"Bambú, nashi, loto, teca, madreperla. Acuático transparente.","precio":5800,"precio_antes":null,"stock":true,"promocion":false,"imagen":"https://fimgs.net/mdimg/perfume/375x500.554.jpg"},{"id":89,"marca":"Chloé","nombre":"Chloé EDP","genero":"Mujer","ml":75,"notas":"Peonía, lichi, freesia, rosa, magnolia, cedro. Floral rosado icónico.","precio":9500,"precio_antes":null,"stock":true,"promocion":false,"imagen":"https://fimgs.net/mdimg/perfume/375x500.1077.jpg"},{"id":90,"marca":"Bvlgari","nombre":"Aqva Pour Homme EDT","genero":"Hombre","ml":100,"notas":"Mandarina, petitgrain, almíbar, musgo marino. Fresco acuático mineral.","precio":6800,"precio_antes":null,"stock":true,"promocion":false,"imagen":"https://fimgs.net/mdimg/perfume/375x500.549.jpg"}]
</script>

<script>
  // =========================================================
  //  ⚙️  CONFIGURACIÓN — lo único que tenés que editar
  // =========================================================
  const CONFIG = {
    // URL pública CSV del Google Sheet (ver SETUP.md para cómo generarla).
    // Si queda vacío, se usan los datos embebidos más arriba.
    sheetCsvUrl: '',

    // WhatsApp — formato internacional SIN + ni espacios
    whatsappNumber: '59899284367',

    // URL pública del catálogo (para incluir el link del producto en los mensajes WA).
    // Ej: 'https://salvador-perfumeria.vercel.app'
    // Si queda vacío, usa la URL actual del navegador.
    catalogUrl: '',

    whatsappIntro: 'Hola! Me interesa este perfume del catálogo:',
  };

  const BOTTLE_SVG = `<svg viewBox="0 0 100 140" fill="none" xmlns="http://www.w3.org/2000/svg">
    <rect x="40" y="4" width="20" height="20" rx="2" stroke="#0B3D91" stroke-width="2"/>
    <rect x="35" y="24" width="30" height="10" rx="2" stroke="#0B3D91" stroke-width="2"/>
    <path d="M25 44 Q25 38 30 36 L70 36 Q75 38 75 44 L75 125 Q75 134 66 134 L34 134 Q25 134 25 125 Z" stroke="#0B3D91" stroke-width="2"/>
    <line x1="35" y1="60" x2="65" y2="60" stroke="#C9A24B" stroke-width="1" opacity="0.6"/>
    <text x="50" y="95" font-family="Georgia" font-size="10" text-anchor="middle" fill="#0B3D91" opacity="0.7" font-style="italic">Salvador</text>
  </svg>`;

  const fmtPrice = n => '$' + Number(n).toLocaleString('es-UY');
  const norm = s => (s || '').toString().toLowerCase().trim();
  const isYes = v => /^(si|sí|s[ií]|yes|true|1|verdadero)$/i.test(String(v || '').trim());

  function getCatalogBaseUrl() {
    if (CONFIG.catalogUrl) return CONFIG.catalogUrl.replace(/\/+$/, '');
    if (window.location.protocol === 'file:') return '';
    return window.location.origin + window.location.pathname.replace(/index\.html$/, '').replace(/\/$/, '');
  }

  function normalizeRow(r) {
    return {
      id: Number(r['ID'] ?? r.id) || 0,
      marca: (r['Marca'] ?? r.marca ?? '').toString().trim(),
      nombre: (r['Nombre'] ?? r.nombre ?? '').toString().trim(),
      genero: (r['Genero'] ?? r['Género'] ?? r.genero ?? '').toString().trim(),
      ml: r['Tamaño (ml)'] ?? r['Tamano (ml)'] ?? r.ml ?? '',
      notas: (r['Notas / Descripcion'] ?? r['Notas / Descripción'] ?? r.notas ?? '').toString().trim(),
      precio: Number((r['Precio (UYU)'] ?? r.precio ?? '').toString().replace(/[^\d.-]/g, '')) || 0,
      precio_antes: Number((r['Precio antes (UYU)'] ?? r.precio_antes ?? '').toString().replace(/[^\d.-]/g, '')) || null,
      stock: isYes(r['Stock'] ?? r.stock),
      promocion: isYes(r['Promocion'] ?? r['Promoción'] ?? r.promocion),
      imagen: (r['Imagen URL'] ?? r.imagen ?? '').toString().trim(),
    };
  }

  async function loadPerfumes() {
    if (CONFIG.sheetCsvUrl) {
      try {
        const url = CONFIG.sheetCsvUrl + (CONFIG.sheetCsvUrl.includes('?') ? '&' : '?') + 'cb=' + Math.floor(Date.now() / 30000);
        const res = await fetch(url);
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const csv = await res.text();
        const parsed = Papa.parse(csv, { header: true, skipEmptyLines: true });
        if (parsed.errors.length) console.warn('CSV warnings:', parsed.errors);
        const rows = parsed.data.map(normalizeRow).filter(p => p.id);
        if (rows.length) {
          console.log(`[catálogo] ${rows.length} perfumes desde Google Sheets`);
          return rows;
        }
      } catch (e) {
        console.warn('[catálogo] Falló Google Sheets, usando seed:', e.message);
      }
    }
    const seed = JSON.parse(document.getElementById('seed-data').textContent);
    console.log(`[catálogo] ${seed.length} perfumes desde seed embebido`);
    return seed;
  }

  let perfumes = [];
  let currentFilter = 'todos';
  let currentSearch = '';

  function buildWhatsAppUrl(p) {
    const base = getCatalogBaseUrl();
    const link = base ? `${base}#p=${p.id}` : '';
    let msg = `${CONFIG.whatsappIntro}\n\n`;
    msg += `*${p.marca}*\n`;
    msg += `${p.nombre}${p.ml ? ' · ' + p.ml + 'ml' : ''}\n`;
    if (p.promocion && p.precio_antes && p.precio_antes > p.precio) {
      msg += `💰 ${fmtPrice(p.precio)} UYU (antes ${fmtPrice(p.precio_antes)})\n`;
    } else {
      msg += `💰 ${fmtPrice(p.precio)} UYU\n`;
    }
    if (link) msg += `\n🔗 ${link}`;
    return `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(msg)}`;
  }

  function escapeAttr(s) {
    return String(s || '').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  function cardHTML(p) {
    const waHref = buildWhatsAppUrl(p);
    const imgBlock = p.imagen
      ? `<img src="${escapeAttr(p.imagen)}" alt="${escapeAttr(p.marca + ' ' + p.nombre)}" loading="lazy" onerror="this.outerHTML='${BOTTLE_SVG.replace(/\n/g,'').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}'"/>`
      : BOTTLE_SVG;
    const priceBefore = (p.promocion && p.precio_antes && p.precio_antes > p.precio)
      ? `<span class="price-before">${fmtPrice(p.precio_antes)}</span>` : '';
    const promoBadge = p.promocion ? '<span class="badge">Promo</span>' : '';
    const genBadge = p.genero ? `<span class="badge genero genero-${p.genero.toLowerCase()}">${p.genero}</span>` : '';
    return `
      <article class="card${p.promocion ? ' promo' : ''}" id="p-${p.id}" data-id="${p.id}">
        <div class="card-img">${imgBlock}${promoBadge}${genBadge}</div>
        <div class="card-body">
          <div class="brand-name">${p.marca}</div>
          <h3 class="perfume-name">${p.nombre}</h3>
          <div class="ml">${p.ml ? p.ml + ' ml' : '&nbsp;'}</div>
          <p class="notas">${p.notas}</p>
          <div class="price-row">
            <span class="price">${fmtPrice(p.precio)}</span>
            <span class="price-cur">UYU</span>
            ${priceBefore}
          </div>
          <a class="wa-btn" href="${waHref}" target="_blank" rel="noopener">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 3.5A11.9 11.9 0 0012 0C5.4 0 .1 5.4.1 12c0 2.1.6 4.2 1.6 6L0 24l6.2-1.6a12 12 0 005.8 1.5h.01c6.6 0 12-5.4 12-12 0-3.2-1.2-6.2-3.5-8.4zM12 21.8h-.01a9.9 9.9 0 01-5-1.4l-.4-.2-3.7.9 1-3.6-.3-.4A10 10 0 0112 2.2c5.4 0 9.8 4.4 9.8 9.8 0 5.4-4.4 9.8-9.8 9.8zm5.4-7.3c-.3-.1-1.7-.9-2-1-.3-.1-.5-.2-.7.2-.2.3-.8 1-1 1.2-.2.2-.4.2-.6.1-.3-.1-1.2-.4-2.4-1.4-.9-.8-1.4-1.8-1.6-2.1-.2-.3 0-.5.1-.6.1-.1.3-.4.4-.5.2-.2.2-.3.3-.5.1-.2 0-.4 0-.6 0-.2-.7-1.6-.9-2.2-.3-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 1-1 2.4s1 2.8 1.2 3c.2.2 2 3 4.8 4.3 1.7.7 2.3.8 3.2.7.5-.1 1.7-.7 1.9-1.3.2-.6.2-1.2.2-1.3-.1-.2-.3-.2-.6-.3z"/></svg>
            Consultar stock
          </a>
        </div>
      </article>
    `;
  }

  function render() {
    const grid = document.getElementById('grid');
    let list = perfumes.filter(p => p.stock);

    if (currentFilter === 'Hombre' || currentFilter === 'Mujer') {
      list = list.filter(p => p.genero === currentFilter);
    } else if (currentFilter === 'promos') {
      list = list.filter(p => p.promocion);
    }

    if (currentSearch) {
      const q = norm(currentSearch);
      list = list.filter(p =>
        norm(p.marca).includes(q) ||
        norm(p.nombre).includes(q) ||
        norm(p.notas).includes(q)
      );
    }

    const title = document.getElementById('grid-title');
    const sub = document.getElementById('grid-sub');
    if (currentFilter === 'promos') {
      title.textContent = '✦ Promociones';
      sub.textContent = list.length ? `${list.length} en promo` : 'Sin promociones activas';
    } else {
      title.textContent = 'Nuestro catálogo';
      sub.textContent = list.length ? `${list.length} perfume${list.length === 1 ? '' : 's'} disponible${list.length === 1 ? '' : 's'}` : 'Sin resultados';
    }

    if (!list.length) {
      grid.innerHTML = `<div class="empty">No encontramos perfumes con esos criterios.</div>`;
      return;
    }
    grid.innerHTML = list.map(cardHTML).join('');
    applyDeepLink();
  }

  function applyDeepLink() {
    const m = window.location.hash.match(/#p=(\d+)/);
    if (!m) return;
    const el = document.getElementById('p-' + m[1]);
    if (el) {
      setTimeout(() => {
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        el.classList.add('highlighted');
        setTimeout(() => el.classList.remove('highlighted'), 2800);
      }, 100);
    }
  }

  document.getElementById('filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.chip');
    if (!btn) return;
    document.querySelectorAll('#filters .chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });
  document.getElementById('search').addEventListener('input', (e) => {
    currentSearch = e.target.value;
    render();
  });
  window.addEventListener('hashchange', applyDeepLink);

  (async () => {
    try {
      perfumes = await loadPerfumes();
      render();
    } catch (e) {
      document.getElementById('grid').innerHTML = `
        <div class="error-box">
          <strong>No se pudo cargar el catálogo</strong><br>
          <small>${e.message}</small>
        </div>`;
    }
  })();
</script>
</body>
</html>
